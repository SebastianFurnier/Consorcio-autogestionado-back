services:
  postgres:
    image: postgres:16
    container_name: consorcio-db
    restart: always
    environment:
      POSTGRES_DB: consorcio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v0.9.0 # O la versión estable más reciente
    container_name: garage_server
    restart: always
    expose:
      - "3900"
    volumes:
      - ./garage.toml:/etc/garage.toml
      - ./garage_data:/var/lib/garage
    environment:
      - TZ=America/Argentina/Buenos_Aires

  api:
    build: .
    container_name: consorcio-api
    restart: always
    ports:
      - "8081:8080"
    environment:
      DB_IP: postgres
      DB_PORT: 5432
      DB_NAME: consorcio
      DB_USER: postgres
      DB_PASSWORD: root
      FRONT_URL: https://turnow.vercel.app/
      S3_ACCESS_KEY: GK01129bd56d74d5792dc13ceb
      S3_SECRET_KEY: 6ac56506506eae5037377065f69879d0096c6d8251ff0fd84e9881ee7f55771c
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_started

volumes:
  pgdata: